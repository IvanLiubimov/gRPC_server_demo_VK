syntax = "proto3";

import "google/protobuf/empty.proto";

option java_outer_classname = "KVProto";
option java_package = "ru.kv.grpc";

service KVService {
  rpc get (GetRequest) returns (GetReply) {}
  rpc put (PutRequest) returns (google.protobuf.Empty) {}
  rpc delete (DeleteRequest) returns (google.protobuf.Empty) {}
  rpc range (RangeRequest) returns (stream KeyValue) {}
  rpc count (CountRequest) returns (CountReply) {}
}


message PutRequest {
  string key = 1;
  bytes value = 2;
}

message GetRequest {
  string key = 1;
}

message GetReply {
  bytes value = 1;
}

message DeleteRequest {
  string key = 1;
}

message RangeRequest {
  string key_since = 1;
  string key_to =2;
}

message CountRequest {
}

message CountReply {
  int64 message = 1;
}

message KeyValue {
  string key = 1;
  bytes value = 2;
}